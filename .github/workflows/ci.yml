name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend unit tests
        working-directory: backend
        run: pytest -q

  api-smoke:
    runs-on: ubuntu-latest
    needs: backend-tests

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGODB_URI: mongodb://127.0.0.1:27017
      MONGODB_DB_NAME: mood_detection_system_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start FastAPI backend
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend-ci.log 2>&1 &

      - name: Wait for backend startup
        run: |
          python - <<'PY'
          import time
          import urllib.request

          deadline = time.time() + 90
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5) as r:
                      if r.status == 200:
                          print('Backend is healthy')
                          break
              except Exception:
                  time.sleep(2)
          else:
              raise SystemExit('Backend did not become healthy in time')
          PY

      - name: Run API smoke flow
        run: python scripts/ci_api_smoke.py --base-url http://127.0.0.1:8000

      - name: Print backend logs on failure
        if: failure()
        run: cat backend-ci.log
